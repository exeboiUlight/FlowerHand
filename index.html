<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<link rel="icon" href="icon.ico" type="image/x-icon" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlowerHand — Анонимный молодежный чат</title>
<!-- Шрифты -->
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet"/>
<style>
  body {
    margin: 0;
    font-family: 'Rubik', sans-serif;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #fff;
    overflow: hidden;
  }

  .promo {
    text-align: center;
    padding: 40px 20px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    max-width: 700px;
    width: 90%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 10px #fff; }
    50% { box-shadow: 0 0 20px #00ffff; }
    100% { box-shadow: 0 0 10px #fff; }
  }

  h1 {
    font-size: 3em;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }

  p {
    font-size: 1.2em;
    margin-bottom: 30px;
  }

  .btn {
    display: inline-block;
    padding: 15px 30px;
    font-size: 1.2em;
    font-weight: 700;
    color: #fff;
    background: #ff69b4;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
    text-decoration: none;
  }

  .btn:hover {
    background: #ff85c1;
    transform: scale(1.05);
  }

  /* Анимация фона */
  body::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #00ffff, transparent 70%);
    animation: rotate 40s linear infinite;
    z-index: -1;
  }

  @keyframes rotate {
    from {transform: rotate(0deg);}
    to {transform: rotate(360deg);}
  }
</style>
</head>
<body>

<div class="promo">
  <h1>🔒 Анонимный молодежный чат 🔒</h1>
  <p>Общайся без лишних данных! Защищай свою приватность и оставайся анонимным. Быстро, ярко, безопасно — всё для твоего комфорта.</p>
  <a href="FlowerHand.zip" class="btn">Начать сейчас</a>
</div>

</body>
</html>
